name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Java 21 set kar rahe hain jo latest material aur gradle dono ko support karega
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 2. GitHub ko bol rahe hain ki purana gradlew chhod kar direct stable Gradle 8.10.2 use kare
    - name: Setup Gradle 8.10.2
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoAdWatcher-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
